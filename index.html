<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>永盛電器工單系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
input,textarea,select,button{font-family:inherit}
input,textarea,select{width:100%;max-width:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;background:#f4f6f9;min-height:100vh;color:#1a1a1a}
.app{max-width:680px;margin:0 auto;padding:12px}
.login-screen,.setup-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#fff;border:1px solid #e4e7ec;border-radius:18px;padding:28px 24px;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 12px rgba(16,24,40,.04)}
.btn-login{background:#1a5fa8;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;width:100%;cursor:pointer;margin-top:12px}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.car-opt{border:2px solid #e4e7ec;border-radius:12px;padding:14px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:12px;width:100%;margin-bottom:10px;text-align:left}
.car-opt.selected{border-color:#1a5fa8;background:#eff6ff}
.main-screen{display:none}
.header{background:#1a5fa8;color:#fff;border-radius:14px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:10px 0;border-radius:10px;font-size:13px;cursor:pointer;border:1px solid #d0d5dd;background:#fff;text-align:center}
.tab.active{background:#1a5fa8;color:#fff;border-color:#1a5fa8}
.panel{display:none}.panel.active{display:block}
.form-card{background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:18px;margin-bottom:12px;text-align:left}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;text-align:left}
.fg label{font-size:12px;color:#667085;font-weight:600}
.fg input,.fg textarea{border:1px solid #d0d5dd;border-radius:8px;padding:10px;font-size:14px;outline:none}
.fg input:focus,.fg textarea:focus{border-color:#1a5fa8}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.machine-item{background:#f9fafb;border:1px solid #e4e7ec;border-radius:10px;padding:12px;margin-bottom:10px;text-align:left}
.machine-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.btn-remove{background:none;border:none;color:#b42318;cursor:pointer;font-size:16px;padding:2px 4px}
.photo-area{border:2px dashed #d0d5dd;border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#fafafa;margin-bottom:10px}
.photo-area:hover{border-color:#1a5fa8;background:#f0f5ff}
.photo-preview{display:flex;flex-wrap:wrap;gap:8px}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:1px solid #e4e7ec}
.rec-card{background:#fff;border:1px solid #e4e7ec;border-radius:12px;padding:14px;margin-bottom:10px;text-align:left}
.rec-header{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;align-items:flex-start}
.rec-title{font-size:14px;font-weight:700;line-height:1.5}
.rec-sub{font-size:12px;color:#667085;line-height:1.6;word-break:break-word}
.rec-actions{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #f2f4f7}
.rec-btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner.show{display:inline-block}
.toast-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);padding:16px}
.toast-overlay.show{display:flex}
.toast-box{background:#fff;border-radius:16px;padding:24px;text-align:center;width:100%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.empty{background:#fff;border:1px dashed #d0d5dd;border-radius:12px;padding:18px;text-align:center;color:#667085}
.help{font-size:12px;color:#667085;margin-top:6px}
@media (max-width:640px){
  .app{padding:10px}
  .row2,.rec-actions{grid-template-columns:1fr;flex-direction:column}
  .header{flex-direction:column;align-items:flex-start}
  .tabs{flex-direction:column}
}
</style>
</head>
<body>

<div class="toast-overlay" id="toast-overlay">
  <div class="toast-box">
    <div style="font-size:48px;margin-bottom:12px" id="toast-icon">✅</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px" id="toast-title">成功</div>
    <div style="font-size:14px;color:#667085;line-height:1.6;margin-bottom:20px" id="toast-msg"></div>
    <button style="background:#1a5fa8;color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer" onclick="closeToast()">確認</button>
  </div>
</div>

<div id="setup-screen" class="setup-screen">
  <div class="card">
    <h2 style="margin-bottom:12px">永盛工單系統</h2>
    <p style="font-size:13px;color:#667085;margin-bottom:16px">請先綁定本裝置的車隊代號</p>
    <div style="width:100%">
      <button type="button" class="car-opt" onclick="selectCar('06H',this)">06H 車隊</button>
      <button type="button" class="car-opt" onclick="selectCar('06I',this)">06I 車隊</button>
      <button type="button" class="car-opt" onclick="selectCar('06J',this)">06J 車隊</button>
      <button type="button" class="car-opt" onclick="selectCar('TEST',this)">測試帳號</button>
    </div>
    <button type="button" class="btn-login" id="confirm-car-btn" style="opacity:0.5" onclick="confirmCar()">確認綁定</button>
  </div>
</div>

<div id="login-screen" class="login-screen">
  <div class="card">
    <div id="login-car-badge" style="background:#dbeafe;color:#1d4ed8;padding:4px 12px;border-radius:20px;margin-bottom:10px;display:inline-block;font-weight:700"></div>
    <p style="margin-bottom:12px">請輸入通行碼</p>
    <input type="password" id="login-pw" style="text-align:center;font-size:20px;letter-spacing:4px;border:1.5px solid #d0d5dd;border-radius:10px;padding:10px">
    <button type="button" class="btn-login" id="login-btn" onclick="doLogin()">進入系統</button>
    <div class="help">首次登入成功後，此裝置會綁定目前車隊</div>
  </div>
</div>

<div id="main-screen" class="main-screen">
  <div class="app">
    <div class="header">
      <div style="font-weight:700">永盛電器工單</div>
      <div id="header-car">--</div>
    </div>
    <div class="tabs">
      <button type="button" class="tab active" onclick="showTab('new',event)">新增工單</button>
      <button type="button" class="tab" onclick="showTab('records',event)">我的記錄</button>
    </div>

    <div id="panel-new" class="panel active">
      <div class="form-card">
        <div class="fg"><label>日期</label><input type="date" id="f-date"></div>
        <div class="row2">
          <div class="fg"><label>收件人</label><input type="text" id="f-name"></div>
          <div class="fg"><label>電話</label><input type="tel" id="f-phone"></div>
        </div>
        <div class="fg"><label>地址</label><input type="text" id="f-addr"></div>
        <div id="machine-list"></div>
        <button type="button" class="btn-login" style="background:#fff;color:#1a5fa8;border:1px dashed #1a5fa8" onclick="addMachine()">+ 新增機型</button>

        <div class="fg" style="margin-top:15px">
          <label>施工照片</label>
          <div class="photo-area" onclick="document.getElementById('f-photos').click()">📷 點此選擇照片</div>
          <input type="file" id="f-photos" multiple accept="image/*" style="display:none" onchange="previewPhotos(this)">
          <div id="photo-preview" class="photo-preview"></div>
        </div>
        <div class="fg"><label>備註</label><textarea id="f-note"></textarea></div>

        <button type="button" class="btn-login" id="submit-btn" onclick="submitOrder()"><span class="spinner" id="spinner"></span><span id="submit-text">送出工單</span></button>
      </div>
    </div>

    <div id="panel-records" class="panel">
      <div id="rec-list" class="empty">尚未載入資料</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="del-modal">
  <div class="modal-box">
    <p style="margin-bottom:20px" id="del-msg">確定要刪除這筆工單嗎？</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button type="button" class="rec-btn" style="background:#f2f4f7" id="del-cancel-btn" onclick="closeDelModal()">取消</button>
      <button type="button" class="rec-btn" style="background:#b42318;color:#fff" id="del-confirm-btn" onclick="confirmDelete()">確認刪除</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <p style="font-weight:700;margin-bottom:4px">✏️ 編輯工單</p>
    <p style="font-size:11px;color:#b42318;margin-bottom:12px">⚠️ 工單鎖定機制：僅能修改一次</p>
    <div class="fg"><label>收件人</label><input type="text" id="e-name"></div>
    <div class="fg"><label>電話</label><input type="tel" id="e-phone"></div>
    <div class="fg"><label>地址</label><input type="text" id="e-addr"></div>
    <div id="e-machine-list"></div>
    <button type="button" class="btn-login" style="background:#fff;color:#1a5fa8;border:1px dashed #1a5fa8;padding:8px" onclick="addEditMachine()">+ 增加機型</button>
    <div class="fg" style="margin-top:10px"><label>備註</label><textarea id="e-note"></textarea></div>
    <div style="display:flex;gap:10px;margin-top:15px;flex-wrap:wrap">
      <button type="button" class="rec-btn" style="background:#f2f4f7" onclick="closeEditModal()">取消</button>
      <button type="button" class="rec-btn" style="background:#15803d;color:#fff" id="e-confirm-btn" onclick="confirmEdit()">儲存修改</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="photo-modal">
  <div class="modal-box">
    <p style="font-weight:700;margin-bottom:12px">📷 補上傳照片</p>
    <div class="photo-area" onclick="document.getElementById('add-photos-input').click()">📷 點此選擇照片</div>
    <input type="file" id="add-photos-input" multiple accept="image/*" style="display:none" onchange="previewAddPhotos(this)">
    <div id="add-photo-preview" class="photo-preview"></div>
    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
      <button type="button" class="rec-btn" style="background:#f2f4f7" onclick="closePhotoModal()">取消</button>
      <button type="button" class="rec-btn" style="background:#1a5fa8;color:#fff" id="photo-confirm-btn" onclick="confirmAddPhotos()">上傳照片</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzRcPrGV7o6PaZS2ik8wgL2LllEwbb9vBk_U8eF9uiuQYzBOF1kxtmDbRkmHDx_7m_f/exec';
let lockedCar = localStorage.getItem('ys_locked_car') || '';
let machines = [];
let currentOrders = [];
let editMachines = [];
let photoData = [];
let addPhotoData = [];
let pendingDeleteId = '';
let pendingEditId = '';
let pendingPhotoId = '';
let toastCallback = null;

function getDeviceKey(){
  let key = localStorage.getItem('ys_device_key');
  if(!key){
    key = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    localStorage.setItem('ys_device_key', key);
  }
  return key;
}

window.onload = function(){
  lockedCar = localStorage.getItem('ys_locked_car') || '';
  if(lockedCar) showLogin();
  else document.getElementById('setup-screen').style.display='flex';
};

function selectCar(car,el){
  window.pendingCar = car;
  document.querySelectorAll('.car-opt').forEach(function(x){ x.classList.remove('selected'); });
  el.classList.add('selected');
  document.getElementById('confirm-car-btn').style.opacity = '1';
}

function confirmCar(){
  if(!window.pendingCar){
    showToast('error','尚未選擇','請先選擇車隊代號');
    return;
  }
  localStorage.setItem('ys_locked_car', window.pendingCar);
  lockedCar = window.pendingCar;
  location.reload();
}

function showLogin(){
  document.getElementById('login-car-badge').textContent = lockedCar;
  document.getElementById('login-screen').style.display = 'flex';
}

async function doLogin(){
  const btn = document.getElementById('login-btn');
  const pin = document.getElementById('login-pw').value.trim();
  if(!pin){
    showToast('error','未輸入通行碼','請先輸入通行碼');
    return;
  }
  btn.disabled = true;
  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'verifyPin', car:lockedCar, pin:pin, deviceKey:getDeviceKey()})
    });
    const json = await res.json();
    if(json.success){
      document.getElementById('login-pw').value='';
      document.getElementById('login-screen').style.display='none';
      initMain();
    }else{
      showToast('error','通行碼錯誤','請重新輸入通行碼');
    }
  }catch(err){
    showToast('error','登入失敗','請確認 GAS 網址與網路是否正常');
  }finally{
    btn.disabled = false;
  }
}

function initMain(){
  document.getElementById('main-screen').style.display='block';
  document.getElementById('header-car').textContent = lockedCar;
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  machines = [];
  photoData = [];
  document.getElementById('machine-list').innerHTML = '';
  document.getElementById('photo-preview').innerHTML = '';
  addMachine();
}

function addMachine(){
  const id = Math.random().toString(36).slice(2,7);
  machines.push({id:id});
  document.getElementById('machine-list').insertAdjacentHTML('beforeend', `
    <div class="machine-item" id="m-${id}">
      <div class="machine-header"><span style="font-size:11px;font-weight:700">機型</span><button type="button" class="btn-remove" onclick="removeMachine('${id}')">✕</button></div>
      <div class="row2">
        <div class="fg"><label>品牌</label><input type="text" id="mb-${id}"></div>
        <div class="fg"><label>安裝費</label><input type="number" id="mf-${id}" min="0"></div>
      </div>
      <div class="fg"><label>型號</label><input type="text" id="mm-${id}"></div>
    </div>`);
}

function removeMachine(id){
  machines = machines.filter(function(m){ return m.id!==id; });
  const el = document.getElementById('m-'+id);
  if(el) el.remove();
  if(!machines.length) addMachine();
}

function previewPhotos(inp){
  photoData = [];
  document.getElementById('photo-preview').innerHTML = '';
  Array.from(inp.files || []).forEach(function(f){
    const r = new FileReader();
    r.onload = function(e){
      photoData.push(e.target.result);
      document.getElementById('photo-preview').insertAdjacentHTML('beforeend', `<img src="${e.target.result}" class="photo-thumb">`);
    };
    r.readAsDataURL(f);
  });
}

function collectMachines(list){
  return list
    .map(function(m){
      return {
        brand:(document.getElementById('mb-'+m.id) || document.getElementById('eb-'+m.id) || {}).value || '',
        model:(document.getElementById('mm-'+m.id) || document.getElementById('em-'+m.id) || {}).value || '',
        fee:Number((document.getElementById('mf-'+m.id) || document.getElementById('ef-'+m.id) || {}).value || 0)
      };
    })
    .filter(function(m){ return m.brand.trim() || m.model.trim() || m.fee > 0; });
}

async function submitOrder(){
  const btn = document.getElementById('submit-btn');
  const spin = document.getElementById('spinner');
  const submitText = document.getElementById('submit-text');

  const date = document.getElementById('f-date').value;
  const addr = document.getElementById('f-addr').value.trim();
  const mData = collectMachines(machines);

  if(!date || !addr || !mData.length){
    showToast('error','資料未填完整','請填寫日期、地址，並至少輸入一筆機型資料');
    return;
  }

  btn.disabled = true;
  spin.classList.add('show');
  submitText.textContent = '傳送中...';

  const payload = {
    id:String(Date.now()),
    car:lockedCar,
    deviceKey:getDeviceKey(),
    orderType:'安裝',
    date:date,
    name:document.getElementById('f-name').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    addr:addr,
    shipno:'',
    trackno:'',
    machines:mData,
    totalFee:mData.reduce(function(sum,m){ return sum + Number(m.fee || 0); },0),
    note:document.getElementById('f-note').value.trim(),
    photos:photoData
  };

  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)
    });
    const json = await res.json();
    if(json.success){
      showToast('success','送出成功','工單已存檔，照片已上傳', resetForm);
    }else{
      showToast('error','送出失敗', json.error || '請稍後再試');
    }
  }catch(err){
    showToast('error','網路錯誤','請確認前端網址與 GAS Web App 已正確部署');
  }finally{
    btn.disabled = false;
    spin.classList.remove('show');
    submitText.textContent = '送出工單';
  }
}

function resetForm(){
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-addr').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-photos').value = '';
  document.getElementById('photo-preview').innerHTML = '';
  photoData = [];
  machines = [];
  document.getElementById('machine-list').innerHTML = '';
  addMachine();
}

function showTab(t,e){
  document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
  e.target.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(x){ x.classList.remove('active'); });
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='records') renderRecords();
}

async function renderRecords(){
  const el = document.getElementById('rec-list');
  el.innerHTML = '載入中...';
  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'getRecords', car:lockedCar, deviceKey:getDeviceKey()})
    });
    const json = await res.json();
    if(!json.success) throw new Error(json.error || '讀取失敗');
    currentOrders = json.records || [];
    if(!currentOrders.length){
      el.innerHTML = '<div class="empty">目前尚無工單記錄</div>';
      return;
    }
    el.innerHTML = currentOrders.map(function(o){
      const machineText = (o.machines || []).map(function(m){ return [m.brand,m.model].filter(Boolean).join(' '); }).join('、') || '未填寫';
      return `
        <div class="rec-card">
          <div class="rec-header">
            <div>
              <div class="rec-title">${escapeHtml(o.name || '未填收件人')} ｜ $${Number(o.totalFee || 0)}</div>
              <div class="rec-sub">${escapeHtml(o.date || '')} ｜ ${escapeHtml(o.addr || '')}</div>
              <div class="rec-sub">機型：${escapeHtml(machineText)}</div>
              <div class="rec-sub">照片：${escapeHtml(o.photo || '無')}</div>
            </div>
            <div style="font-size:11px;color:#1a5fa8;font-weight:700">${escapeHtml(o.car || lockedCar)}</div>
          </div>
          <div class="rec-actions">
            <button type="button" class="rec-btn" style="background:#eff6ff;color:#1a5fa8" onclick="openPhotoModal('${o.id}')">📷 補照片</button>
            ${o.editedOnce ? '<button type="button" class="rec-btn" disabled style="background:#eee;color:#999">已修改</button>' : `<button type="button" class="rec-btn" style="background:#f0fdf4;color:#15803d" onclick="openEditModal('${o.id}')">✏️ 編輯</button>`}
            <button type="button" class="rec-btn" style="background:#fff1f2;color:#b42318" onclick="openDelModal('${o.id}')">🗑️ 刪除</button>
          </div>
        </div>`;
    }).join('');
  }catch(err){
    el.innerHTML = `<div class="empty">讀取失敗：${escapeHtml(err.message || '未知錯誤')}</div>`;
  }
}

function openDelModal(id){
  pendingDeleteId = id;
  document.getElementById('del-msg').textContent = '確定要刪除工單 ' + id + ' 嗎？';
  document.getElementById('del-modal').classList.add('show');
}
function closeDelModal(){ document.getElementById('del-modal').classList.remove('show'); }

async function confirmDelete(){
  const btn = document.getElementById('del-confirm-btn');
  btn.disabled = true;
  btn.textContent = '正在刪除中...';
  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'deleteRecord', id:pendingDeleteId, car:lockedCar, deviceKey:getDeviceKey()})
    });
    const json = await res.json();
    if(json.success){
      closeDelModal();
      renderRecords();
      showToast('success','刪除完成','工單已刪除');
    }else{
      showToast('error','刪除失敗', json.error || '請稍後再試');
    }
  }catch(err){
    showToast('error','刪除失敗','網路或後端發生錯誤');
  }finally{
    btn.disabled = false;
    btn.textContent = '確認刪除';
  }
}

function openEditModal(id){
  const o = currentOrders.find(function(x){ return String(x.id)===String(id); });
  if(!o || o.editedOnce) return;
  pendingEditId = id;
  document.getElementById('e-name').value = o.name || '';
  document.getElementById('e-phone').value = o.phone || '';
  document.getElementById('e-addr').value = o.addr || '';
  document.getElementById('e-note').value = o.note || '';
  editMachines = (o.machines || []).map(function(m){
    return {id:Math.random().toString(36).slice(2,7), brand:m.brand||'', model:m.model||'', fee:Number(m.fee||0)};
  });
  if(!editMachines.length) editMachines.push({id:Math.random().toString(36).slice(2,7), brand:'', model:'', fee:0});
  renderEditMachines();
  document.getElementById('edit-modal').classList.add('show');
}

function renderEditMachines(){
  document.getElementById('e-machine-list').innerHTML = editMachines.map(function(m){
    return `
    <div class="machine-item">
      <div class="machine-header"><span style="font-size:11px;font-weight:700">機型</span><button type="button" class="btn-remove" onclick="removeEditMachine('${m.id}')">✕</button></div>
      <div class="row2">
        <div class="fg"><label>品牌</label><input type="text" id="eb-${m.id}" value="${escapeAttr(m.brand||'')}"></div>
        <div class="fg"><label>安裝費</label><input type="number" id="ef-${m.id}" min="0" value="${Number(m.fee||0)}"></div>
      </div>
      <div class="fg"><label>型號</label><input type="text" id="em-${m.id}" value="${escapeAttr(m.model||'')}"></div>
    </div>`;
  }).join('');
}

function addEditMachine(){
  editMachines.push({id:Math.random().toString(36).slice(2,7), brand:'', model:'', fee:0});
  renderEditMachines();
}

function removeEditMachine(id){
  editMachines = editMachines.filter(function(m){ return m.id!==id; });
  if(!editMachines.length) editMachines.push({id:Math.random().toString(36).slice(2,7), brand:'', model:'', fee:0});
  renderEditMachines();
}

async function confirmEdit(){
  const btn = document.getElementById('e-confirm-btn');
  btn.disabled = true;
  btn.textContent = '儲存中...';
  const mData = editMachines.map(function(m){
    return {
      brand:(document.getElementById('eb-'+m.id).value || '').trim(),
      model:(document.getElementById('em-'+m.id).value || '').trim(),
      fee:Number(document.getElementById('ef-'+m.id).value || 0)
    };
  }).filter(function(m){ return m.brand || m.model || m.fee > 0; });

  const updates = {
    name:document.getElementById('e-name').value.trim(),
    phone:document.getElementById('e-phone').value.trim(),
    addr:document.getElementById('e-addr').value.trim(),
    note:document.getElementById('e-note').value.trim(),
    machines:mData
  };

  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'updateRecord', id:pendingEditId, car:lockedCar, deviceKey:getDeviceKey(), updates:updates})
    });
    const json = await res.json();
    if(json.success){
      closeEditModal();
      renderRecords();
      showToast('success','修改完成','工單已更新，且該筆已鎖定不可再次修改');
    }else{
      showToast('error','修改失敗', json.error || '請稍後再試');
    }
  }catch(err){
    showToast('error','修改失敗','網路或後端發生錯誤');
  }finally{
    btn.disabled = false;
    btn.textContent = '儲存修改';
  }
}
function closeEditModal(){ document.getElementById('edit-modal').classList.remove('show'); }

function openPhotoModal(id){
  pendingPhotoId = id;
  addPhotoData = [];
  document.getElementById('add-photo-preview').innerHTML = '';
  document.getElementById('add-photos-input').value = '';
  document.getElementById('photo-modal').classList.add('show');
}
function closePhotoModal(){ document.getElementById('photo-modal').classList.remove('show'); }

function previewAddPhotos(inp){
  addPhotoData = [];
  document.getElementById('add-photo-preview').innerHTML = '';
  Array.from(inp.files || []).forEach(function(f){
    const r = new FileReader();
    r.onload = function(e){
      addPhotoData.push(e.target.result);
      document.getElementById('add-photo-preview').insertAdjacentHTML('beforeend', `<img src="${e.target.result}" class="photo-thumb">`);
    };
    r.readAsDataURL(f);
  });
}

async function confirmAddPhotos(){
  if(!addPhotoData.length){
    showToast('error','尚未選擇照片','請先選擇要補傳的照片');
    return;
  }
  const btn = document.getElementById('photo-confirm-btn');
  btn.disabled = true;
  btn.textContent = '上傳中...';
  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'addPhotos', id:pendingPhotoId, car:lockedCar, deviceKey:getDeviceKey(), photos:addPhotoData})
    });
    const json = await res.json();
    if(json.success){
      closePhotoModal();
      renderRecords();
      showToast('success','補傳完成','照片已補傳到原工單資料夾');
    }else{
      showToast('error','補傳失敗', json.error || '請稍後再試');
    }
  }catch(err){
    showToast('error','補傳失敗','網路或後端發生錯誤');
  }finally{
    btn.disabled = false;
    btn.textContent = '上傳照片';
  }
}

function showToast(type, title, msg, cb){
  toastCallback = typeof cb === 'function' ? cb : null;
  document.getElementById('toast-icon').textContent = type==='success' ? '✅' : '❌';
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-overlay').classList.add('show');
}

function closeToast(){
  document.getElementById('toast-overlay').classList.remove('show');
  if(toastCallback){
    const fn = toastCallback;
    toastCallback = null;
    fn();
  }
}

function escapeHtml(str){
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function escapeAttr(str){ return escapeHtml(str); }
</script>
